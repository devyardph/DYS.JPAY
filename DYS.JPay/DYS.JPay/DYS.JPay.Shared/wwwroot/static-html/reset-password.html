<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Ledger - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#003345',
                        'primary-container': '#004b63',
                        background: '#f7f9ff',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9ff; color: #181c20; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
        .ledger-gradient { background: linear-gradient(135deg, #003345 0%, #004b63 100%); }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black text-[#003345] tracking-tight">Finance Tracker</h1>
            <p class="text-[10px] text-[#40484c] font-bold uppercase tracking-widest opacity-70">Architect Ledger</p>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-sm border border-[#dfe3e8]/10 space-y-6">
            <div class="space-y-2">
                <h2 class="text-2xl font-headline font-extrabold text-[#003345]">Reset Password</h2>
                <p class="text-sm text-[#40484c]">Choose a new secure password for your account.</p>
            </div>

            <form action="login.html" class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-[#40484c] uppercase tracking-wider pl-1">New Password</label>
                    <input type="password" required placeholder="••••••••" class="w-full px-5 py-4 bg-[#f1f4fa] border-none rounded-2xl text-sm focus:ring-2 focus:ring-[#003345] transition-all outline-none">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-[#40484c] uppercase tracking-wider pl-1">Confirm Password</label>
                    <input type="password" required placeholder="••••••••" class="w-full px-5 py-4 bg-[#f1f4fa] border-none rounded-2xl text-sm focus:ring-2 focus:ring-[#003345] transition-all outline-none">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full ledger-gradient text-white py-4 rounded-2xl font-bold shadow-xl active:scale-[0.98] transition-all">
                        Update Password
                    </button>
                </div>
            </form>

            <p class="text-center text-sm text-[#40484c]">
                Changed your mind? <a href="login.html" class="font-bold text-[#003345] hover:underline">Back to sign in</a>
            </p>
        </div>
    </div>
</body>
</html>
