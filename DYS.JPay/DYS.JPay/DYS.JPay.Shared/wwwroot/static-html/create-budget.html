<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Ledger - Create Budget Category</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#003345',
                        'primary-container': '#004b63',
                        secondary: '#016a60',
                        'secondary-container': '#9ff2e4',
                        tertiary: '#003816',
                        'tertiary-fixed-dim': '#7fda91',
                        error: '#ba1a1a',
                        'error-container': '#ffdad6',
                        background: '#f7f9ff',
                        surface: '#f7f9ff',
                        'surface-container-low': '#f1f4fa',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-highest': '#dfe3e8',
                        'on-surface': '#181c20',
                        'on-surface-variant': '#40484c',
                        'outline-variant': '#c0c7cd',
                        'on-primary': '#ffffff',
                        'on-primary-container': '#83bad6',
                        'on-secondary-container': '#117166',
                        'on-tertiary-fixed-variant': '#005323',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9ff; color: #181c20; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="antialiased p-4 md:p-12">
    <div class="max-w-2xl mx-auto space-y-12">
        <div class="flex items-center gap-4">
            <a href="budget.html" class="p-2 hover:bg-[#f1f4fa] rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="rotate-180"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <div>
                <h1 class="text-4xl font-headline font-extrabold text-[#003345] tracking-tight">New Category</h1>
                <p class="text-[#40484c]">Define the basic parameters of your budget.</p>
            </div>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-[#dfe3e8]/10 space-y-8">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Category Name</label>
                    <input type="text" placeholder="e.g. Drafting Supplies" class="w-full bg-[#f1f4fa] border-none rounded-2xl px-6 py-4 text-lg font-headline font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Monthly Limit</label>
                    <div class="relative">
                        <span class="absolute left-6 top-1/2 -translate-y-1/2 font-bold text-[#003345]">$</span>
                        <input type="number" placeholder="0.00" class="w-full bg-[#f1f4fa] border-none rounded-2xl pl-10 pr-6 py-4 text-lg font-headline font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Icon Representation</label>
                    <div class="flex gap-2">
                        <button class="p-3 rounded-xl bg-[#003345] text-white shadow-lg scale-110">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </button>
                        <button class="p-3 rounded-xl bg-[#f1f4fa] text-[#40484c] hover:bg-[#dfe3e8]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                        </button>
                        <button class="p-3 rounded-xl bg-[#f1f4fa] text-[#40484c] hover:bg-[#dfe3e8]">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-1.1 0-2 .9-2 2v7c0 1.1.9 2 2 2h10"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="pt-6 flex gap-4">
                <a href="budget-success.html" class="flex-1 py-4 bg-[#003345] text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-center">
                    Create Category
                </a>
                <a href="budget.html" class="px-8 py-4 text-[#40484c] font-bold hover:bg-[#f1f4fa] rounded-2xl transition-colors text-center">
                    Cancel
                </a>
            </div>
        </div>
    </div>
</body>
</html>
