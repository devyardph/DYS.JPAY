<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Ledger - Record Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#003345',
                        'primary-container': '#004b63',
                        secondary: '#016a60',
                        'secondary-container': '#9ff2e4',
                        tertiary: '#003816',
                        'tertiary-fixed-dim': '#7fda91',
                        error: '#ba1a1a',
                        'error-container': '#ffdad6',
                        background: '#f7f9ff',
                        surface: '#f7f9ff',
                        'surface-container-low': '#f1f4fa',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-highest': '#dfe3e8',
                        'on-surface': '#181c20',
                        'on-surface-variant': '#40484c',
                        'outline-variant': '#c0c7cd',
                        'on-primary': '#ffffff',
                        'on-primary-container': '#83bad6',
                        'on-secondary-container': '#117166',
                        'on-tertiary-fixed-variant': '#005323',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9ff; color: #181c20; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
        .ledger-gradient { background: linear-gradient(135deg, #003345 0%, #004b63 100%); }
    </style>
</head>
<body class="antialiased p-4 md:p-12">
    <div class="max-w-2xl mx-auto space-y-12">
        <div class="flex items-center gap-4">
            <a href="debt-tracker.html" class="p-2 hover:bg-[#f1f4fa] rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="rotate-180"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <div>
                <h1 class="text-4xl font-headline font-extrabold text-primary tracking-tight">Record Payment</h1>
                <p class="text-on-surface-variant">Update your architectural liabilities with a new payment.</p>
            </div>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-outline-variant/10 space-y-8">
            <div class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Select Debt</label>
                    <select class="w-full bg-surface-container-low border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-primary transition-all">
                        <option>Studio Mortgage (Chase Bank)</option>
                        <option>Equipment Loan (Wells Fargo)</option>
                        <option>Corporate Amex (American Express)</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Payment Amount</label>
                        <div class="relative">
                            <span class="absolute left-6 top-1/2 -translate-y-1/2 font-bold text-primary">$</span>
                            <input type="number" placeholder="0.00" class="w-full bg-surface-container-low border-none rounded-2xl pl-10 pr-6 py-4 text-lg font-headline font-bold focus:ring-2 focus:ring-primary transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Payment Date</label>
                        <input type="date" class="w-full bg-surface-container-low border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-primary transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Source Account</label>
                    <select class="w-full bg-surface-container-low border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-primary transition-all">
                        <option>Main Checking (Chase Bank)</option>
                        <option>Business Savings (Chase Bank)</option>
                        <option>Personal Checking (Bank of America)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Notes (Optional)</label>
                    <textarea placeholder="Add any additional details about this payment..." class="w-full bg-surface-container-low border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-primary transition-all min-h-[100px]"></textarea>
                </div>
            </div>

            <div class="pt-6 flex flex-col sm:flex-row gap-4">
                <a href="payment-success.html" class="flex-1 py-4 bg-primary text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-center">
                    Record Payment
                </a>
                <a href="debt-tracker.html" class="px-8 py-4 text-on-surface-variant font-bold hover:bg-surface-container-low rounded-2xl transition-colors text-center">
                    Cancel
                </a>
            </div>
        </div>
    </div>
</body>
</html>
