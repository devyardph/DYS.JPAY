<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Ledger - New Transaction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#003345',
                        'primary-container': '#004b63',
                        secondary: '#016a60',
                        'secondary-container': '#9ff2e4',
                        tertiary: '#003816',
                        'tertiary-fixed-dim': '#7fda91',
                        error: '#ba1a1a',
                        'error-container': '#ffdad6',
                        background: '#f7f9ff',
                        surface: '#f7f9ff',
                        'surface-container-low': '#f1f4fa',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-highest': '#dfe3e8',
                        'on-surface': '#181c20',
                        'on-surface-variant': '#40484c',
                        'outline-variant': '#c0c7cd',
                        'on-primary': '#ffffff',
                        'on-primary-container': '#83bad6',
                        'on-secondary-container': '#117166',
                        'on-tertiary-fixed-variant': '#005323',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9ff; color: #181c20; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="antialiased p-4 md:p-12">
    <div class="max-w-2xl mx-auto space-y-12">
        <div class="flex items-center gap-4">
            <a href="dashboard.html" class="p-2 hover:bg-[#f1f4fa] rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="rotate-180"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <div>
                <h1 class="text-4xl font-headline font-extrabold text-[#003345] tracking-tight">New Transaction</h1>
                <p class="text-[#40484c]">Log a new financial event into the architectural ledger.</p>
            </div>
        </div>

        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-[#dfe3e8]/10 space-y-8">
            <div class="space-y-6">
                <div class="flex bg-[#f1f4fa] p-1.5 rounded-2xl">
                    <button class="flex-1 py-3 text-xs font-bold rounded-xl bg-[#ba1a1a] text-white shadow-md">Expense</button>
                    <button class="flex-1 py-3 text-xs font-bold rounded-xl text-[#40484c] hover:text-[#ba1a1a]">Income</button>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Description</label>
                    <input type="text" placeholder="e.g. Monthly Studio Rent" class="w-full bg-[#f1f4fa] border-none rounded-2xl px-6 py-4 text-lg font-headline font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Amount</label>
                        <div class="relative">
                            <span class="absolute left-6 top-1/2 -translate-y-1/2 font-bold text-[#003345]">$</span>
                            <input type="number" placeholder="0.00" class="w-full bg-[#f1f4fa] border-none rounded-2xl pl-10 pr-6 py-4 text-lg font-headline font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Category</label>
                        <select class="w-full bg-[#f1f4fa] border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                            <option>Equipment</option>
                            <option>Project Fee</option>
                            <option>Supplies</option>
                            <option>Consulting</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Account</label>
                        <select class="w-full bg-[#f1f4fa] border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                            <option>Main Checking (Chase Bank)</option>
                            <option>Savings Account (Chase Bank)</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-[#40484c]">Reference (Optional)</label>
                        <input type="text" placeholder="Inv #12345" class="w-full bg-[#f1f4fa] border-none rounded-2xl px-6 py-4 text-sm font-bold focus:ring-2 focus:ring-[#003345] transition-all">
                    </div>
                </div>
            </div>

            <div class="pt-6 flex gap-4">
                <a href="transaction-success.html" class="flex-1 py-4 bg-[#003345] text-white rounded-2xl font-bold shadow-xl active:scale-95 transition-all text-center">
                    Log Transaction
                </a>
                <a href="dashboard.html" class="px-8 py-4 text-[#40484c] font-bold hover:bg-[#f1f4fa] rounded-2xl transition-colors text-center">
                    Cancel
                </a>
            </div>
        </div>
    </div>
</body>
</html>
