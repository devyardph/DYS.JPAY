<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Ledger - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#003345',
                        'primary-container': '#004b63',
                        background: '#f7f9ff',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9ff; color: #181c20; font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
        .ledger-gradient { background: linear-gradient(135deg, #003345 0%, #004b63 100%); }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black text-[#003345] tracking-tight">Finance Tracker</h1>
            <p class="text-[10px] text-[#40484c] font-bold uppercase tracking-widest opacity-70">Architect Ledger</p>
        </div>

        <div class="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-sm border border-[#dfe3e8]/10 space-y-6">
            <div class="space-y-2">
                <h2 class="text-2xl font-headline font-extrabold text-[#003345]">Welcome Back</h2>
                <p class="text-sm text-[#40484c]">Access your architectural financial dashboard.</p>
            </div>

            <form action="dashboard.html" class="space-y-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-[#40484c] uppercase tracking-wider pl-1">Email Address</label>
                    <input type="email" required placeholder="alex@sterling.com" class="w-full px-5 py-4 bg-[#f1f4fa] border-none rounded-2xl text-sm focus:ring-2 focus:ring-[#003345] transition-all outline-none">
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-xs font-bold text-[#40484c] uppercase tracking-wider">Password</label>
                        <a href="forgot-password.html" class="text-xs font-bold text-[#003345] hover:underline">Forgot?</a>
                    </div>
                    <input type="password" required placeholder="••••••••" class="w-full px-5 py-4 bg-[#f1f4fa] border-none rounded-2xl text-sm focus:ring-2 focus:ring-[#003345] transition-all outline-none">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full ledger-gradient text-white py-4 rounded-2xl font-bold shadow-xl active:scale-[0.98] transition-all">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-[#dfe3e8]/50"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-[#40484c] font-medium">Or continue with</span></div>
            </div>

            <button class="w-full flex items-center justify-center space-x-3 py-4 border border-[#dfe3e8] rounded-2xl hover:bg-[#f1f4fa] transition-colors active:scale-[0.98]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
                <span class="text-sm font-bold text-[#003345]">Google Account</span>
            </button>

            <p class="text-center text-sm text-[#40484c]">
                New here? <a href="signup.html" class="font-bold text-[#003345] hover:underline">Create an account</a>
            </p>
        </div>
    </div>
</body>
</html>
