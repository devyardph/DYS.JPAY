<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - POS & Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            headline: ['Manrope', 'sans-serif'],
          },
          colors: {
            primary: '#6d28d9',
            'primary-container': '#4c1d95',
            secondary: '#8b5cf6',
            'secondary-container': '#c4b5fd',
            tertiary: '#5b21b6',
            'tertiary-fixed-dim': '#a78bfa',
            background: '#f7f9ff',
            surface: '#f7f9ff',
            'surface-container-low': '#f1f4fa',
            'surface-container-lowest': '#ffffff',
            'surface-container-highest': '#dfe3e8',
            'on-surface': '#181c20',
            'on-surface-variant': '#40484c',
            'outline-variant': '#c0c7cd',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f7f9ff; color: #181c20; }
    h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
    .ledger-gradient { background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-surface-container-lowest rounded-3xl p-8 shadow-2xl border border-outline-variant/10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      </div>
      <h1 class="text-3xl font-headline font-black text-primary tracking-tight">Welcome Back</h1>
      <p class="text-on-surface-variant mt-2">Sign in to manage your store</p>
    </div>
    
    <form class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-on-surface-variant mb-2">Email Address</label>
        <input type="email" placeholder="you@example.com" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
      </div>
      
      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-sm font-bold text-on-surface-variant">Password</label>
          <a href="#" class="text-xs font-bold text-primary hover:text-primary-container transition-colors">Forgot?</a>
        </div>
        <input type="password" placeholder="••••••••" class="w-full bg-surface-container-low border border-outline-variant/30 rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
      </div>
      
      <button type="button" class="w-full ledger-gradient text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition-all mt-6">
        Sign In
      </button>
    </form>
    
    <div class="mt-8 text-center">
      <p class="text-sm text-on-surface-variant">
        Don't have an account? 
        <a href="#" class="font-bold text-primary hover:text-primary-container transition-colors ml-1">Create one</a>
      </p>
    </div>
  </div>
</body>
</html>
