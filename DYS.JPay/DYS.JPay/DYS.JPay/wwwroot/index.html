<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>JPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        headline: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6d28d9',
                        'primary-container': '#4c1d95',
                        secondary: '#8b5cf6',
                        background: '#f7f9ff',
                        surface: '#f7f9ff',
                        'surface-container-low': '#f1f4fa',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-highest': '#dfe3e8',
                        'on-surface': '#181c20',
                        'on-surface-variant': '#40484c',
                        'outline-variant': '#c0c7cd',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                     padding: {
                        'safe-top': 'env(safe-area-inset-top)',
                        /*'safe-bottom': 'env(safe-area-inset-bottom)',*/
                        'safe-left': 'env(safe-area-inset-left)',
                        'safe-right': 'env(safe-area-inset-right)',
                    }

                }
            }
        }
    </script>
    <style>
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9ff;
            color: #181c20;
            height: 100%;
            margin: 0;
            padding: 0;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
            /*  padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);*/
        }

  /*      #app {
            -webkit-overflow-scrolling: touch;
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }*/

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Manrope', sans-serif;
        }

        .ledger-gradient {
            background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%);
        }

        .glass-nav {
            backdrop-filter: blur(16px);
            background-color: rgba(247, 249, 255, 0.8);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body id="app" class="h-full pt-safe-top pb-safe-bottom">

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>
        function openModal(id) {
            const modal = document.getElementById(id);
            const content = document.getElementById(id + '-content');
            modal.classList.remove('hidden');
            // small delay to allow display:block to apply before opacity transition
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }
        function closeModal(id) {
            const modal = document.getElementById(id);
            const content = document.getElementById(id + '-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content');
            const texts = document.querySelectorAll('.sidebar-text');
            const logo = document.getElementById('sidebar-logo');
            const iconLogo = document.getElementById('sidebar-icon-logo');
            const header = document.getElementById('sidebar-header');
            const collapseIcon = document.getElementById('collapse-icon');
            const navLinks = document.querySelectorAll('.nav-link');

            const isCollapsed = sidebar.classList.contains('w-20');
       
            if (isCollapsed) {
                sidebar.classList.remove('w-20');
                sidebar.classList.add('w-64');
                mainContent.classList.remove('lg:ml-20');
                mainContent.classList.add('lg:ml-64');

                texts.forEach(t => t.classList.remove('hidden'));
                logo.classList.remove('hidden');
                iconLogo.classList.add('hidden');
                iconLogo.classList.remove('flex');
                header.classList.remove('justify-center');
                header.classList.add('justify-between');

                navLinks.forEach(link => {
                    link.classList.remove('justify-center', 'px-0');
                    link.classList.add('space-x-3', 'px-4');
                });

                collapseIcon.setAttribute('d', 'M15 19l-7-7 7-7');
            } else {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-20');
                mainContent.classList.remove('lg:ml-64');
                mainContent.classList.add('lg:ml-20');

                texts.forEach(t => t.classList.add('hidden'));
                logo.classList.add('hidden');
                iconLogo.classList.remove('hidden');
                iconLogo.classList.add('flex');
                header.classList.remove('justify-between');
                header.classList.add('justify-center');

                navLinks.forEach(link => {
                    link.classList.remove('space-x-3', 'px-4');
                    link.classList.add('justify-center', 'px-0');
                });

                collapseIcon.setAttribute('d', 'M9 5l7 7-7 7');
            }
        }
        function toggleMainbar() {
            const sidebar = document.getElementById('sidebar');
            const isSideBarCollapsed = sidebar.classList.contains('w-20');
            if (isSideBarCollapsed) {
                toggleSidebar();
            } 
        }
        function animateCart(id) {
            const element = document.getElementById(id);
            if (!element) return;

            // Add highlight + subtle scale
            element.classList.add(
                'bg-primary/10',
                'ring-2',
                'ring-primary/40',
                'scale-[1.02]',
                'transition',
                'duration-300',
                'ease-in-out'
            );

            // Smooth scroll to element
            element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            // Remove highlight after 2 seconds
            setTimeout(() => {
                element.classList.remove(
                    'bg-primary/10',
                    'ring-2',
                    'ring-primary/40',
                    'scale-[1.02]'
                );
            }, 2000);
        }
        function showProgessBar() {
            const modal = document.getElementById("result-modal");
            const progressBar = document.getElementById("progress-bar");

            // Show modal
            modal.classList.remove("hidden", "opacity-0");
            modal.classList.add("opacity-100");

            // Reset bar instantly to full width
            progressBar.style.transition = "none";
            progressBar.style.width = "100%";

            // Force reflow so browser registers the reset
            void progressBar.offsetWidth;

            // Animate shrinking to 0% over 10s
            progressBar.style.transition = "width 10s linear";
            progressBar.style.width = "0%";

            // Close modal after 10s
            setTimeout(() => {
                modal.classList.add("opacity-0");
                setTimeout(() => modal.classList.add("hidden"), 300);
            }, 2000);
        }
    </script>
</body>
</html>
